name: Keep Streamlit App Awake

on:
  schedule:
    # Runs every 6 hours — well under the 12-hour sleep threshold
    - cron: "0 */6 * * *"
  workflow_dispatch: {}  # allows manual trigger from the Actions tab too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the app to keep it awake
        run: |
          curl -sS "https://resume-reviewer-assistant-jay-bhatt.streamlit.app/" -o /dev/null -w "HTTP %{http_code}\n" || true
